set_to_next_free_day:
  name: "Rezept anhand Index auf nächsten freien Tag setzen"
  description: "Nimmt den Index des Rezepts aus dem Sensor, bucht es bei Mealie und schickt eine Push-Nachricht."
  fields:
    recipe_index:
      name: "Rezept Index"
      description: "Die Position des Rezepts im Kochvorschläge-Sensor (z.B. 0 für das erste Rezept)."
      required: true
      selector:
        number:
          min: 0
          max: 20
          mode: box

add_missing_ingredients:
  name: "Fehlende Zutaten eines Index auf To-Do-Liste setzen"
  description: "Liest die fehlenden Zutaten des gewählten Rezept-Index aus und schiebt sie auf die To-Do-Liste."
  fields:
    recipe_index:
      name: "Rezept Index"
      description: "Die Position des Rezepts im Kochvorschläge-Sensor (z.B. 0 für das erste Rezept)."
      required: true
      selector:
        number:
          min: 0
          max: 20
          mode: box
